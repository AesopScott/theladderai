<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The Ladder AI - Verifiable AI Training</title>
  <desc id="desc">Open Graph image for The Ladder AI welcome page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101a"/>
      <stop offset="0.55" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#172331"/>
    </linearGradient>
    <radialGradient id="burst" cx="62%" cy="38%" r="58%">
      <stop offset="0" stop-color="#fff3a8" stop-opacity="0.95"/>
      <stop offset="0.22" stop-color="#ffc44b" stop-opacity="0.78"/>
      <stop offset="0.52" stop-color="#ff7b1e" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ff7b1e" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#c9a05a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="825" cy="180" r="400" fill="url(#burst)" filter="url(#softGlow)"/>
  <circle cx="1050" cy="535" r="250" fill="#6080a8" opacity="0.14" filter="url(#softGlow)"/>
  <circle cx="140" cy="585" r="260" fill="#c9a05a" opacity="0.12" filter="url(#softGlow)"/>

  <g transform="translate(750 -32) scale(0.55)" opacity="0.98">
    <rect x="-42" y="32" width="540" height="700" rx="18" fill="#000" opacity="0.74"/>
    <g fill="#fff">
      <polygon points="92,716 210,716 386,70 278,70"/>
      <polygon points="328,716 444,716 250,70 140,70"/>
      <polygon points="560,716 676,716 480,70 372,70"/>
      <rect x="694" y="70" width="82" height="646"/>
      <rect x="195" y="186" width="186" height="55"/>
      <rect x="168" y="376" width="270" height="56"/>
      <rect x="132" y="570" width="326" height="58"/>
      <rect x="444" y="186" width="180" height="55"/>
      <rect x="492" y="376" width="184" height="56"/>
      <rect x="544" y="570" width="130" height="58"/>
    </g>
  </g>

  <g filter="url(#textGlow)">
    <text x="72" y="118" fill="#dbb87a" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="6">THE LADDER AI</text>
    <text x="72" y="244" fill="#ffffff" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">Train.</text>
    <text x="72" y="342" fill="#ffffff" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">Certify.</text>
    <text x="72" y="440" fill="#dbb87a" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="88" font-weight="900" letter-spacing="-2">Prove it.</text>
  </g>

  <text x="76" y="510" fill="#dbe4ed" opacity="0.92" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">Placement, guided AI training, validated certification,</text>
  <text x="76" y="552" fill="#dbe4ed" opacity="0.92" font-family="Hanken Grotesk, DM Sans, Segoe UI, Arial, sans-serif" font-size="30" font-weight="600">and evidence records for learners, teams, and employers.</text>

  <rect x="72" y="582" width="260" height="4" fill="#dbb87a"/>
</svg>
