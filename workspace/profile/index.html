<!DOCTYPE html>
<!-- theladder2-v0.1.0 | routed workspace -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon_16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon_32.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/favicon_512.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - The Ladder AI Workspace</title>
  <meta name="description" content="One guided AI learning ladder — concepts, products, and use cases — with placement, training conversations, certification, and transcript evidence.">

  <!-- Canonical + Open Graph / Twitter social preview -->
  <link rel="canonical" href="https://theladderai.com/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="The Ladder AI">
  <meta property="og:title" content="The Ladder AI - AESOP AI Academy">
  <meta property="og:description" content="One guided AI learning ladder — concepts, products, and use cases — with placement, training conversations, certification, and transcript evidence.">
  <meta property="og:url" content="https://theladderai.com/">
  <meta property="og:image" content="https://theladderai.com/components/og-theladder.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="The Ladder AI - AESOP AI Academy">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="The Ladder AI - AESOP AI Academy">
  <meta name="twitter:description" content="One guided AI learning ladder — concepts, products, and use cases — with placement, training conversations, certification, and transcript evidence.">
  <meta name="twitter:image" content="https://theladderai.com/components/og-theladder.jpg">
  <script>
    if (localStorage.getItem('aesop-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
  <link rel="stylesheet" href="/site.css?v=50">
</head>
<body class="l2 l2-loaded">

  <!-- ============ INTRO SPLASH (marketing image, dissolves into the page) ============ -->
  <div class="l2-preloader" id="l2Preloader" aria-hidden="true">
    <img class="l2-preloader__img l2-preloader__img--ladder4" src="/components/ladder4.png?v=1" alt="The Ladder AI">
  </div>

  <nav class="nav">
    <div class="nav-inner ladder-nav">
      <a class="nav-brand-group" href="/workspace/" aria-label="The Ladder AI workspace home">
        <span class="nav-brand-logo" aria-hidden="true"></span>
      </a>
      <div class="hero-navlabels-wrap">
        <div class="hero-navlabels">
          <div class="hero-navlabel-group">
            <label class="hero-language-control hero-navlabel hero-navlabel--l">
              <select id="l2Lang" class="ladder-select hero-language-select" aria-label="Language">
                <option value="en">English</option>
              </select>
            </label>
            <a class="l2-navlink hero-navlabel hero-navlabel--r" href="/workspace/profile/">Profile</a>
          </div>
          <div class="hero-navlabel-group">
            <a class="l2-navlink hero-navlabel hero-navlabel--l" href="/workspace/certification/">Certification</a>
            <a class="l2-navlink hero-navlabel hero-navlabel--r" href="/workspace/support/">Support</a>
          </div>
        </div>
      </div>
      <div class="ladder-corner-controls">
        <button class="theme-toggle" id="l2DarkToggle" type="button" aria-label="Toggle dark mode"></button>
      </div>
    </div>
  </nav>

  <main class="ladder-app">
    <section class="l2-section" id="profile">
          <div class="l2-section-head">
            <div>
              <span class="l2-eyebrow">Your record</span>
              <h2 class="l2-section-title">Profile</h2>
            </div>
          </div>
          <div class="l2-profile-lead-row">
            <p class="l2-section-lead">Everything you've earned and where you left off — plus a direct line to support.</p>
            <div class="l2-learner-id">
              <span class="l2-learner-id-label">Learner ID</span>
              <span id="l2LearnerId" class="l2-learner-id-value">—</span>
            </div>
          </div>
    
          <!-- certifications + progress (moved here from the top page) -->
          <div class="l2-cert-strip">
            <div class="hero-certifications-row">
              <span class="hero-cert-label">Certifications earned</span>
              <span id="l2HeroCertCount" class="hero-cert-count">0</span>
            </div>
            <div class="ladder-hero-stats" aria-label="Ladder progress summary">
              <div class="ladder-hero-stat ladder-hero-stat--primary">
                <strong id="l2StatCourses">0 / 15</strong>
                <span>tiers completed</span>
              </div>
              <div class="ladder-hero-stat">
                <strong id="l2StatTiers">0</strong>
                <span>tiers placed out</span>
              </div>
              <div class="ladder-hero-stat">
                <strong id="l2StatCertified">0</strong>
                <span>core</span>
              </div>
              <div class="ladder-hero-stat">
                <strong id="l2StatExpert">0</strong>
                <span>expert</span>
              </div>
              <div class="ladder-hero-stat">
                <strong id="l2StatMastery">0</strong>
                <span>mastery</span>
              </div>
            </div>
            <a class="l2-btn l2-btn--ghost" href="/ladder-certifications.html" style="margin-top:1rem;">View certification record</a>
          </div>
    
        </section>

  </main>

  <script>
    if (localStorage.getItem('aesop-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
  <script type="module" src="/components/ladder2-app-wheel-lock.js?v=10"></script>
</body>
</html>
