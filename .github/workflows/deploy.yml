name: Deploy to Mocahost

on:
  push:
    branches:
      - main
  workflow_dispatch:        # manual "Run workflow" button for force redeploys

concurrency:
  group: deploy-mocahost
  cancel-in-progress: false   # let runs queue + finish in order (latest still wins)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 65.181.111.131
          username: hivetec1
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./
          server-dir: /public_html/theladderai/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.claude/**
            **/secrets.php
            **/secrets.local.php
            **/config.local.php
            **/*.bat
            **/*.ps1
            **/README.md
            **/.DS_Store
            cgi-bin/**
            .htaccess
