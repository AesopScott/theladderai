name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare static deploy folder
        run: |
          mkdir -p _site
          rsync -av ./ _site/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude 'node_modules/' \
            --exclude 'aesop-api/' \
            --exclude 'cgi-bin/' \
            --exclude '*.php' \
            --exclude '*secret*' \
            --exclude '*.bat' \
            --exclude '*.ps1' \
            --exclude '.htaccess' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            --exclude 'README.md'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name theladderai-com --branch main
